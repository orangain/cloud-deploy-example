name: Promote to production

on:
  workflow_dispatch:
    inputs:
      release_run_id:
        description: "Successful staging workflow run ID"
        required: true
        type: string

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      releases: ${{ steps.collect.outputs.releases }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.release_run_id }}
          pattern: release-*
          merge-multiple: true
          path: release-metadata
      - id: collect
        run: |
          releases="$(jq -sc '.' release-metadata/*.json)"
          echo "releases=$releases" >> "$GITHUB_OUTPUT"

  promote:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJSON(needs.metadata.outputs.releases) }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          version: ">= 541.0.0"
      - name: Create production rollout
        env:
          GCP_DEPLOY_PROJECT: ${{ vars.GCP_DEPLOY_PROJECT }}
          GCP_DEPLOY_REGION: ${{ vars.GCP_DEPLOY_REGION }}
        run: scripts/promote-release.sh "${{ matrix.item.app }}" "${{ matrix.item.release }}"

