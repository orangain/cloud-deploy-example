name: Release changed apps to staging

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
      release: ${{ steps.detect.outputs.release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: detect
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          apps="$(scripts/changed-apps.sh "$BEFORE" "$AFTER")"
          echo "apps=$apps" >> "$GITHUB_OUTPUT"
          echo "release=git-${GITHUB_SHA::12}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          if [[ "$apps" == "[]" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.apps) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 541.0.0"
      - name: Create release and deploy to staging
        env:
          APP: ${{ matrix.app }}
          GCP_DEPLOY_PROJECT: ${{ vars.GCP_DEPLOY_PROJECT }}
          GCP_DEPLOY_REGION: ${{ vars.GCP_DEPLOY_REGION }}
          RELEASE: ${{ needs.changes.outputs.release }}
        run: |
          gcloud deploy releases create "$RELEASE" \
            --delivery-pipeline="$APP" \
            --project="$GCP_DEPLOY_PROJECT" \
            --region="$GCP_DEPLOY_REGION" \
            --source="apps/$APP" \
            --gcs-source-staging-dir="gs://${GCP_DEPLOY_PROJECT}-cloud-deploy-${GCP_DEPLOY_REGION}/source/${APP}" \
            --images="APP_IMAGE=us-docker.pkg.dev/cloudrun/container/hello:latest" \
            --annotations="commitSha=$GITHUB_SHA,app=$APP"

  request-production-approval:
    needs: [changes, release]
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v3
        with:
          version: ">= 541.0.0"
      - name: Request production batch approval
        env:
          GCP_DEPLOY_PROJECT: ${{ vars.GCP_DEPLOY_PROJECT }}
          APPS_JSON: ${{ needs.changes.outputs.apps }}
          RELEASE: ${{ needs.changes.outputs.release }}
        run: |
          apps="$(jq -r 'join(",")' <<< "$APPS_JSON")"
          gcloud pubsub topics publish cloud-deploy-production-approval-requests \
            --project="$GCP_DEPLOY_PROJECT" \
            --attribute="^:^release=$RELEASE:apps=$apps"
