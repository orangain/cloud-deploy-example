apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: {{ .Values.serviceName }}
  annotations:
    run.googleapis.com/invoker-iam-disabled: "true"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: {{ .Values.maxScale | quote }}
    spec:
      containers:
        - image: {{ .Values.image }}
          ports:
            - containerPort: {{ .Values.containerPort }}
          env:
            {{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
